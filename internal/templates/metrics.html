<!DOCTYPE html>
    <html>
    <head>
        <title>Метрики</title>
    </head>
    <body>
        <h1>Список метрик</h1>
        {{ if . }}
        <ul>
            {{ range $name, $value := . }}
            <li>{{ $name }}: {{ $value }}</li>
            {{ end }}
        </ul>
        {{ else }}
        <p>Метрики не найдены</p>
        {{ end }}
    </body>
    </html>
