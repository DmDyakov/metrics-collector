<!DOCTYPE html>
<html>
<head>
    <title>Метрики</title>
</head>
<body>
    <h1>Список метрик</h1>
    {{ if . }}
    <ul>
        {{ range . }}
        <li>{{ .ID }}: 
            {{ if eq .MType "counter" }}
                {{ .Delta }}
            {{ else }}
                {{ .Value }}
            {{ end }}
        </li>
        {{ end }}
    </ul>
    {{ else }}
    <p>Метрики не найдены</p>
    {{ end }}
</body>
</html>
